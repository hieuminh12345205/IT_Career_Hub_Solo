{% extends "base.html" %}

{% block title %}Ứng tuyển {{ job.title }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <h1 class="h3 mb-2">Ứng tuyển {{ job.title }}</h1>
            <p class="text-muted">{{ job.company.name }}</p>

            <form method="post" enctype="multipart/form-data" class="card card-body">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Gửi đơn ứng tuyển</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
