{% extends "base.html" %}

{% block title %}Xóa tin tuyển dụng{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card card-body shadow-sm border-0">
                <h1 class="h4">Xóa tin tuyển dụng</h1>
                <p>Bạn có chắc muốn xóa tin <strong>{{ object.title }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Xóa</button>
                    <a href="{% url 'jobs:manage' %}" class="btn btn-outline-secondary">Hủy</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
