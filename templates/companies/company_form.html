{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Quản lý công ty{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0">Quản lý công ty</h1>
                <a href="{% url 'jobs:manage' %}" class="btn btn-outline-primary btn-sm">Quản lý tin tuyển dụng</a>
            </div>
            <form method="post" enctype="multipart/form-data" class="card card-body shadow-sm border-0">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary">Lưu công ty</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
