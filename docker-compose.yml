services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-it_career_hub}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d it_career_hub"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --settings=config.settings.dev &&
             python manage.py seed_data --settings=config.settings.dev &&
             python manage.py runserver 0.0.0.0:8000 --settings=config.settings.dev"
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-docker-dev-key}
      DEBUG: ${DEBUG:-True}
      USE_SQLITE: "False"
      DB_NAME: ${DB_NAME:-it_career_hub}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
